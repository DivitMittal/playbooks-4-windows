[defaults]
# ── Inventory & Paths ────────────────────────────────────────────────────────
inventory             = inventory/hosts.yml
roles_path            = roles/
collections_path      = .collections/

# ── Fact Caching ─────────────────────────────────────────────────────────────
# Cache facts for 1 hour to avoid re-gathering on every run
gathering                = smart
fact_caching             = jsonfile
fact_caching_connection  = .facts_cache
fact_caching_timeout     = 3600

# ── Display ───────────────────────────────────────────────────────────────────
stdout_callback          = yaml
bin_ansible_callbacks    = True
# Show task timing and total run time
callbacks_enabled        = profile_tasks, timer

# ── Behaviour ────────────────────────────────────────────────────────────────
retry_files_enabled      = False
host_key_checking        = False
interpreter_python       = auto_silent
# Don't warn about deprecated features mid-run; address them deliberately
deprecation_warnings     = True
system_warnings          = True
command_warnings         = False

# ── Vault ─────────────────────────────────────────────────────────────────────
# Create this file with: echo 'your-vault-password' > .vault_pass && chmod 600 .vault_pass
vault_password_file      = .vault_pass

# ── Remote Execution ─────────────────────────────────────────────────────────
# Windows temp dir for module uploads
remote_tmp               = C:\Windows\Temp\.ansible
# How long to wait for a task to complete (seconds)
timeout                  = 60
# Number of forks for parallel host execution
forks                    = 10

[privilege_escalation]
become        = True
become_method = runas
become_user   = SYSTEM
become_ask_pass = False

[ssh_connection]
pipelining = True
# Multiplexing for faster subsequent connections (Linux/macOS control node)
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

[winrm]
# NTLM for workgroup machines; use kerberos for domain-joined
transport                 = ntlm
operation_timeout_sec     = 120
read_timeout_sec          = 150
message_encryption        = auto
# Set to 'ignore' if using self-signed certs
server_cert_validation    = ignore
