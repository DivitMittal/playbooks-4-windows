---
# ── Directory scaffolding ─────────────────────────────────────────────────────
# Create all directories before deploying files to avoid win_copy failures.
# Using a loop here keeps the task list short — each win_file call is cheap.

- name: Create application config directories
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ xdg_config_home }}"
    - "{{ xdg_data_home }}"
    - "{{ xdg_cache_home }}"
    - "{{ xdg_bin_home }}"
    - "{{ git_config_dir }}"
    - "{{ wezterm_config_dir }}"
    - "{{ fastfetch_config_dir }}"
    - "{{ tridactyl_config_dir }}"
    - "{{ tridactyl_config_dir }}\\themes"
    - "{{ powershell_dir }}"
    - "{{ kanata_config_dir }}"
  loop_control:
    label: "{{ item | basename }}"

- name: Create Firefox chrome directory
  ansible.windows.win_file:
    path: "{{ firefox_profile_path }}\\chrome"
    state: directory
  when: feature_firefox | bool
