---
# ── Encrypted secrets ─────────────────────────────────────────────────────────
# Encrypt this file with: ansible-vault encrypt inventory/group_vars/all/vault.yml
# All variables must be prefixed `vault_` by convention.
#
# IMPORTANT: Never commit this file unencrypted. After filling in real values:
#   make encrypt-vault
#
# Reference these in other var files as:
#   git_email: "{{ vault_git_email }}"

vault_git_email: "your.email@example.com"
vault_git_signing_key: ""           # GPG key fingerprint, or leave empty

# WinRM credentials (for remote management from macOS)
vault_windows_user: "Administrator"
vault_windows_password: "CHANGEME"

# Optional: GitHub token for private repos / higher API rate limits
vault_github_token: ""
