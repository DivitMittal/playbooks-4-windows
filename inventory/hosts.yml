---
# Inventory — all Windows machines managed by this project
#
# Connection modes:
#   local   — running Ansible from within WSL2 on the same machine
#   winrm   — remote execution from macOS/Linux control node
#
# To add a second machine, duplicate the host block and override variables
# in inventory/host_vars/<hostname>.yml

all:
  children:

    windows:
      hosts:

        # ── Primary workstation (local WSL2 execution) ────────────────────────
        windows_workstation:
          ansible_host: 127.0.0.1
          ansible_connection: local
          # Uncomment for WinRM from macOS:
          # ansible_connection: winrm
          # ansible_winrm_transport: ntlm
          # ansible_winrm_server_cert_validation: ignore
          # ansible_user: "{{ vault_windows_user }}"
          # ansible_password: "{{ vault_windows_password }}"
          # ansible_port: 5985

        # ── Secondary / remote machine template ──────────────────────────────
        # windows_server:
        #   ansible_host: 192.168.1.100
        #   ansible_connection: winrm
        #   ansible_winrm_transport: ntlm
        #   ansible_winrm_server_cert_validation: ignore
        #   ansible_user: "{{ vault_windows_user }}"
        #   ansible_password: "{{ vault_windows_password }}"
        #   ansible_port: 5985
